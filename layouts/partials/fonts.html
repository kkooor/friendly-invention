<style>
  /* 定义寒蝉正楷体本地字体 */
  @font-face {
    font-family: '寒蝉正楷体';
    src: url('/fonts/寒蝉正楷体.woff2') format('woff2');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }

  /* 全局强制应用字体 + 基础字号 */
  body {
    font-family: '寒蝉正楷体', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important;
    font-size: 18px; /* 全局默认字号，可根据喜好调整 */
  }

  /* 标题层级放大（保持楷体） */
  h1 { font-size: 2.2rem !important; }   /* 约 40px */
  h2 { font-size: 1.9rem !important; }   /* 约 34px */
  h3 { font-size: 1.6rem !important; }   /* 约 29px */
  h4 { font-size: 1.4rem !important; }
  h5 { font-size: 1.2rem !important; }
  h6 { font-size: 1.1rem !important; }

  /* 段落、列表等继承 body 字号，无需额外设置，但可微调行距 */
  p, li {
    line-height: 1.8; /* 增加可读性 */
  }

  /* 代码块内字号稍小，保持协调 */
  code, pre {
    font-size: 0.9em !important;
  }

  /* 如果你希望评论区等第三方组件不被字号影响，可以不添加额外规则，
     因为它们有自己的作用域，不会被这里的全局样式强制覆盖（除非使用了 !important 且选择器权重高）。
     但为防万一，可保留之前的评论区重置规则（可选） */
  .giscus, .giscus * {
    font-size: 14px !important; /* 若评论字体也被放大，可取消注释本行 */
  }
</style>
