<div class="share-buttons">
  <span class="share-label"><i class="fas fa-share-alt"></i> 分享</span>
  <div class="share-icons">
    <a href="https://twitter.com/intent/tweet?url={{ .Permalink }}&text={{ .Title }}" target="_blank" rel="noopener" title="分享到 Twitter" class="share-btn twitter">
      <i class="fab fa-twitter"></i>
    </a>
    <a href="https://www.facebook.com/sharer/sharer.php?u={{ .Permalink }}" target="_blank" rel="noopener" title="分享到 Facebook" class="share-btn facebook">
      <i class="fab fa-facebook-f"></i>
    </a>
    <a href="https://www.linkedin.com/shareArticle?mini=true&url={{ .Permalink }}&title={{ .Title }}" target="_blank" rel="noopener" title="分享到 LinkedIn" class="share-btn linkedin">
      <i class="fab fa-linkedin-in"></i>
    </a>
    <a href="https://api.whatsapp.com/send?text={{ .Title }}%20{{ .Permalink }}" target="_blank" rel="noopener" title="分享到 WhatsApp" class="share-btn whatsapp">
      <i class="fab fa-whatsapp"></i>
    </a>
    <a href="#" onclick="copyToClipboard('{{ .Permalink }}'); return false;" title="复制链接" class="share-btn copy">
      <i class="fas fa-link"></i>
    </a>
  </div>
</div>
<script>
  function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(() => {
      alert('链接已复制到剪贴板');
    });
  }
</script>
<style>
  .share-buttons {
    display: flex;
    align-items: center;
    gap: 20px;
    margin: 30px 0;
    padding: 15px 0;
    border-top: 1px solid rgba(59,130,246,0.1);
    border-bottom: 1px solid rgba(59,130,246,0.1);
    flex-wrap: wrap;
  }
  .share-label {
    color: #475569;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .share-icons {
    display: flex;
    gap: 12px;
  }
  .share-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(59,130,246,0.08);
    color: #475569;
    text-decoration: none;
    transition: all 0.3s;
    border: 1px solid rgba(59,130,246,0.15);
  }
  .share-btn:hover {
    background: #3b82f6;
    color: white;
    border-color: #3b82f6;
  }
</style>
