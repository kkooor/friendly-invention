<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} - {{ .Site.Title }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            background: linear-gradient(145deg, #f4f9ff 0%, #e3edf5 100%);
            color: #1e293b;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body { padding: 40px 20px; min-height: 100vh; }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 80px;
            padding: 0 40px;
        }
        .logo {
            font-size: 24px;
            font-weight: 600;
            text-decoration: none;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo:hover { color: #3b82f6; }
        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-link {
            color: #475569;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        .nav-link:hover, .nav-link.active { color: #3b82f6; }
        .nav-icons { display: flex; gap: 15px; }
        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(59, 130, 246, 0.08);
            color: #475569;
            text-decoration: none;
            transition: all 0.3s;
            border: 1px solid rgba(59, 130, 246, 0.15);
            cursor: pointer;
        }
        .icon-btn:hover { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }

        .container { max-width: 900px; margin: 0 auto; }
        .page-title {
            font-size: 3rem;
            font-weight: 300;
            margin-bottom: 40px;
            color: #0f172a;
            text-align: center;
        }
        .terms-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
        }
        .term-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 14px 28px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 20px -6px rgba(0,0,0,0.05);
            transition: all 0.25s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .term-card:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: #3b82f6;
            transform: translateY(-3px);
            box-shadow: 0 12px 25px -8px rgba(59,130,246,0.2);
        }
        .term-card a {
            text-decoration: none;
            color: #1e293b;
            font-weight: 500;
            font-size: 1.2rem;
        }
        .term-count {
            background: #3b82f6;
            color: white;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .footer {
            text-align: center;
            margin-top: 100px;
            padding-top: 40px;
            border-top: 1px solid rgba(59,130,246,0.15);
            color: #64748b;
        }
        @media (max-width: 768px) {
            .navbar { flex-direction: column; gap: 20px; }
            .page-title { font-size: 2.5rem; }
            .term-card { padding: 12px 20px; }
            .term-card a { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="{{ .Site.BaseURL }}" class="logo">
            <i class="fas fa-code"></i>
            {{ .Site.Title }}
        </a>
        <div class="nav-links">
            {{ $currentPage := . }}
            {{ range .Site.Menus.main }}
            <a href="{{ .URL }}" class="nav-link {{ if or ($currentPage.IsMenuCurrent "main" .) ($currentPage.HasMenuCurrent "main" .) }}active{{ end }}">{{ .Name }}</a>
            {{ end }}
            <div class="nav-icons">
                <a href="/posts/#search-input" class="icon-btn" title="去文章列表搜索" onclick="sessionStorage.setItem('focusSearch', 'true')">
                    <i class="fas fa-search"></i>
                </a>
                <a href="{{ .Site.Params.github | default "#" | safeURL }}" class="icon-btn" title="GitHub">
                    <i class="fab fa-github"></i>
                </a>
                <a href="/index.xml" class="icon-btn" title="RSS">
                    <i class="fas fa-rss"></i>
                </a>
            </div>
        </div>
    </div>

    <div class="container">
        <h1 class="page-title">{{ .Title }}</h1>
        <div class="terms-cloud">
            {{ range .Data.Terms.Alphabetical }}
            <div class="term-card">
                <a href="{{ .Page.RelPermalink }}">{{ .Page.Title }}</a>
                <span class="term-count">{{ .Count }}</span>
            </div>
            {{ end }}
        </div>
    </div>

    <div class="footer">
        <p>Powered by Hugo | {{ .Site.Title }} © {{ now.Format "2006" }}</p>
    </div>
</body>
</html>
