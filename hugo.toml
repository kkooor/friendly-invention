baseURL = "/"
title = "My New Blog"
# theme = "loficode"

languageCode = "en-us"
enableEmoji = true

# 启用 Sitemap（默认已启用，此处显式声明）
[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

# 启用 Robots.txt
[robots]
  enable = true
  userAgent = "*"
  allow = ["/"]
  sitemap = "/sitemap.xml"

[outputs]
  home = ["HTML", "JSON"]
  page = ["HTML"]
  section = ["HTML"]

[outputFormats]
  [outputFormats.JSON]
    mediaType = "application/json"
    baseName = "index"
    isPlainText = true
  [outputFormats.pages]
    mediaType = "application/json"
    baseName = "pages"
    isPlainText = true

[pagination]
  pagerSize = 6
  path = "page"

[params]
  description = "记录技术、思考与生活。"
  tagline = "代码与咖啡，皆是良伴。"
  github = "https://github.com/kkorcicv"
  ogImage = "/images/og-default.png"

  # 暗黑模式开关
  enableDarkMode = true

  # Giscus 评论配置
  [params.giscus]
    repo = "kkooor/friendly-invention"
    repoId = "R_kgDOSDYvWw"
    category = "Announcements"
    categoryId = "DIC_kwDOSDYvW84C68Sd"
    theme = "preferred_color_scheme"
    lang = "zh-CN"
    inputPosition = "top"
    loading = "lazy"

  [params.author]
    name = "kkorcicv"
    avatar = "/images/avatar.webp"

# 主导航菜单（新增了 Archives）
[[menu.main]]
  name = "Blog"
  url = "/posts/"
  weight = 10

[[menu.main]]
  name = "Categories"
  url = "/categories/"
  weight = 20

[[menu.main]]
  name = "Tags"
  url = "/tags/"
  weight = 30

[[menu.main]]
  name = "Archives"
  url = "/archives/"
  weight = 35

[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 40
  [[menu.main]]
  name = "Series"
  url = "/series/"
  weight = 25

# Markdown 渲染配置
[markup]
  [markup.highlight]
    style = "dracula"
    lineNos = true
    lineNumbersInTable = false
    tabWidth = 2
    noClasses = false

  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 2

# 分类法
[taxonomies]
  category = "categories"
  tag = "tags"
   series = "series"
